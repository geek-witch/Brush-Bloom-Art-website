<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Brush and Bloom</title>
    <link rel="icon" href="imgs/logo.png" type="image/png">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="authstyle.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <!-- Login Card -->
                <div class="card p-4 shadow-lg border-0" id="login-card">
                    <h2 class="text-center">Login</h2>
                    <form id="login-form">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                        </div>
                        <div class="d-flex justify-content-between">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">Remember Me</label>
                            </div>
                            <a href="#" id="forgot-password-link" class="text-danger">Forgot Password?</a>
                        </div>
                        <div id="login-message" class="alert mt-3 d-none"></div>
                        <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
                        <p class="text-center mt-3">Don't have an account? <a href="sigup.html" class="text-danger">Sign up</a></p>
                    </form>
                </div>

                <!-- Forgot Password Card -->
                <div class="card p-4 shadow-lg border-0 d-none" id="forgot-password-card">
                    <h2 class="text-center">Forgot Password</h2>
                    <p class="text-center text-muted mb-4">Enter your email address and we'll send you a link to reset your password.</p>
                    <form id="forgot-password-form">
                        <div class="mb-3">
                            <label for="forgot-email" class="form-label">Email</label>
                            <input type="email" id="forgot-email" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div id="forgot-message" class="alert mt-3 d-none"></div>
                        <button type="submit" class="btn btn-primary w-100 mt-3">Send Reset Link</button>
                        <button type="button" id="back-to-login" class="btn btn-outline-secondary w-100 mt-3">Back to Login</button>
                    </form>
                </div>

                <!-- Reset Password Card -->
                <div class="card p-4 shadow-lg border-0 d-none" id="reset-password-card">
                    <h2 class="text-center">Reset Password</h2>
                    <p class="text-center text-muted mb-4">Enter your new password below.</p>
                    <form id="reset-password-form">
                        <input type="hidden" id="reset-token">
                        <div class="mb-3">
                            <label for="new-password" class="form-label">New Password</label>
                            <input type="password" id="new-password" class="form-control" placeholder="Enter your new password" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirm-password" class="form-label">Confirm Password</label>
                            <input type="password" id="confirm-password" class="form-control" placeholder="Confirm your new password" required>
                        </div>
                        <div id="reset-message" class="alert mt-3 d-none"></div>
                        <button type="submit" class="btn btn-primary w-100 mt-3">Reset Password</button>
                        <button type="button" id="cancel-reset" class="btn btn-outline-secondary w-100 mt-3">Cancel</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="auth.js"></script>
</body>
</html>
